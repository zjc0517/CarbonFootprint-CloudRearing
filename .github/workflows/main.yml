name: CI/CD Pipeline - CarbonFootprint-CloudRearing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 第一阶段：代码质量检查 (Linting)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Lint with flake8
        run: |
          # 检查语法错误和未定义的名称
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 第二阶段：运行单元测试 (Testing) - 核心修复部分
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run Pytest
        env:
          # 关键点 1：显式告诉 Python 将当前根目录加入搜索路径
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 关键点 2：使用 python -m pytest
          # 这会启动当前的 python 解释器并将当前目录作为 sys.path 的一部分
          python -m pytest code/test_carbon_calculator.py

  # 第三阶段：Docker 构建校验
  docker-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: |
          docker build -t carbon-rearing-app:latest -f deployment/Dockerfile .
